<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chéz Gerrard — Week of 20 May</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --page-bg: #F7F6F3;
    --card-bg: #FFFFFF;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: #EBEBEB;
    --accent: #111111;
    --transition: 0.22s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--page-bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 56px;
  }
  .site-logo {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }
  .site-logo span { color: var(--text-muted); font-weight: 400; }
  .site-meta { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .tab-bar {
    position: sticky; top: 56px; z-index: 99;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto;
    scrollbar-width: none; -ms-overflow-style: none;
    padding: 0 20px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 20px 10px;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: border-color var(--transition), color var(--transition);
    user-select: none;
  }
  .tab:hover .tab-day { color: var(--text-primary); }
  .tab-day {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    color: var(--text-muted);
    text-transform: uppercase;
    transition: color var(--transition);
    margin-bottom: 2px;
  }
  .tab-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    transition: color var(--transition);
    max-width: 130px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .tab.active .tab-day { color: var(--tab-accent, #111); }
  .tab.active .tab-name { color: var(--tab-accent, #111); font-weight: 600; }
  .tab.active { border-bottom-color: var(--tab-accent, #111); }

  .panel { display: none; }
  .panel.active { display: block; }

  .hero {
    width: 100%; height: 280px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: var(--hero-gradient);
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
  }
  .hero-emoji {
    position: absolute; right: 48px; top: 50%;
    transform: translateY(-50%);
    font-size: 120px; opacity: 0.12;
    filter: grayscale(0.2);
    pointer-events: none;
    user-select: none;
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 0 36px 28px;
  }
  .cuisine-pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);
    margin-bottom: 10px;
  }
  .hero-title {
    font-size: 32px; font-weight: 800; line-height: 1.15;
    color: #fff; letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .hero-subtitle {
    font-size: 14px; color: rgba(255,255,255,0.75);
    font-style: italic; font-weight: 400;
  }

  .meta-strip {
    background: #fff;
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .meta-strip::-webkit-scrollbar { display: none; }
  .meta-item {
    flex: 1; min-width: 100px;
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 16px;
    border-right: 1px solid var(--border);
  }
  .meta-item:last-child { border-right: none; }
  .meta-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 3px;
  }
  .meta-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }

  .content {
    max-width: 1100px; margin: 0 auto;
    padding: 32px 24px 60px;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
  }
  @media (max-width: 780px) {
    .content { grid-template-columns: 1fr; padding: 20px 16px 48px; gap: 16px; }
    .hero { height: 220px; }
    .hero-title { font-size: 24px; }
    .hero-emoji { font-size: 80px; right: 20px; }
    .hero-content { padding: 0 20px 20px; }
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
  }
  .card-header-accent {
    width: 20px; height: 3px; border-radius: 2px;
    background: var(--meal-accent);
    margin-left: auto;
  }

  .ingredients-list { padding: 8px 0; }
  .ingredient-row {
    display: flex; align-items: baseline;
    padding: 8px 20px;
    gap: 12px;
    border-bottom: 1px solid #F4F4F4;
    transition: background var(--transition);
  }
  .ingredient-row:last-child { border-bottom: none; }
  .ingredient-row:hover { background: #FAFAFA; }
  .ing-qty {
    font-size: 12px; font-weight: 700;
    color: var(--text-primary);
    min-width: 62px; flex-shrink: 0;
  }
  .ing-name { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

  .steps-list { padding: 4px 0; }
  .step {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 0 14px;
    padding: 14px 20px;
    border-bottom: 1px solid #F4F4F4;
  }
  .step:last-child { border-bottom: none; }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--meal-accent);
    color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .step-body {}
  .step-head-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .step-heading { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .time-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    background: var(--meal-accent-light);
    color: var(--meal-accent);
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .step-text {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65;
  }
  .step-bullets {
    list-style: none;
    padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 7px;
  }
  .step-bullets li {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.55;
    padding-left: 16px;
    position: relative;
  }
  .step-bullets li::before {
    content: '·';
    position: absolute; left: 0;
    color: var(--meal-accent);
    font-weight: 700; font-size: 18px; line-height: 1.0;
  }
  .step-bullets li strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .tip-card {
    grid-column: 1 / -1;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--meal-accent);
    padding: 16px 20px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .tip-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: var(--meal-accent); margin-bottom: 3px; }
  .tip-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .prep-card {
    grid-column: 1 / -1;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .prep-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition);
  }
  .prep-toggle.open { border-bottom-color: var(--border); }
  .prep-toggle-left { display: flex; align-items: center; gap: 10px; }
  .prep-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    background: #F0F0F0; color: var(--text-muted);
    padding: 3px 8px; border-radius: 6px;
    text-transform: uppercase;
  }
  .prep-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .prep-chevron {
    width: 20px; height: 20px; color: var(--text-muted);
    transition: transform var(--transition);
    flex-shrink: 0;
  }
  .prep-chevron.open { transform: rotate(180deg); }
  .prep-body { display: none; padding: 16px 20px; }
  .prep-body.open { display: block; }
  .prep-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 7px 0;
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.55;
    border-bottom: 1px solid #F4F4F4;
  }
  .prep-item:last-child { border-bottom: none; }
  .prep-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--meal-accent); flex-shrink: 0; margin-top: 7px;
  }

  .site-footer {
    text-align: center; padding: 24px;
    font-size: 12px; color: var(--text-muted);
    border-top: 1px solid var(--border);
    background: #fff;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel.active { animation: fadeIn 0.2s ease forwards; }
</style>
</head>

// ── RENDER ──────────────────────────────────────────────────────────────────

function buildTabs() {
  const bar = document.getElementById('tabBar');
  MEALS.forEach((m, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.style.setProperty('--tab-accent', m.accent);
    tab.dataset.index = i;
    tab.innerHTML = `<div class="tab-day">${m.shortDay}</div><div class="tab-name">${m.name.split(' ').slice(0,3).join(' ')}</div>`;
    tab.addEventListener('click', () => activateTab(i));
    bar.appendChild(tab);
  });
}

function buildPanels() {
  const main = document.getElementById('mainContent');
  MEALS.forEach((m, i) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.dataset.index = i;
    panel.style.setProperty('--meal-accent', m.accent);
    panel.style.setProperty('--meal-accent-light', m.accentLight);

    const ings = m.ingredients.map(([qty, name]) => {
      if (!name) return `<div class="ingredient-row" style="background:#F7F6F3;"><span class="ing-qty" style="font-size:10px;letter-spacing:0.5px;text-transform:uppercase;color:#999;min-width:unset;width:100%">${qty}</span></div>`;
      return `<div class="ingredient-row"><span class="ing-qty">${qty}</span><span class="ing-name">${name}</span></div>`;
    }).join('');

    const steps = m.steps.map(([time, head, body], idx) => {
      const bodyHtml = Array.isArray(body)
        ? `<ul class="step-bullets">${body.map(b => `<li>${b}</li>`).join('')}</ul>`
        : `<p class="step-text">${body}</p>`;
      return `<div class="step">
        <div class="step-num">${idx + 1}</div>
        <div class="step-body">
          <div class="step-head-row">
            <span class="step-heading">${head}</span>
            <span class="time-badge">${time}</span>
          </div>
          ${bodyHtml}
        </div>
      </div>`;
    }).join('');

    const prepItems = m.sundayPrep.map(p =>
      `<div class="prep-item"><div class="prep-dot"></div><div>${p}</div></div>`
    ).join('');

    panel.innerHTML = `
      <div class="hero" style="--hero-gradient: ${m.gradient}">
        <div class="hero-bg"></div>
        <div class="hero-emoji">${m.emoji}</div>
        <div class="hero-content">
          <div class="cuisine-pill">${m.cuisine}</div>
          <div class="hero-title">${m.name}</div>
          <div class="hero-subtitle">${m.subtitle}</div>
        </div>
      </div>
      <div class="meta-strip">
        <div class="meta-item"><div class="meta-label">Day</div><div class="meta-value">${m.day} · ${m.date}</div></div>
        <div class="meta-item"><div class="meta-label">Serves</div><div class="meta-value">${m.serves}</div></div>
        <div class="meta-item"><div class="meta-label">Active time</div><div class="meta-value">${m.time}</div></div>
        <div class="meta-item"><div class="meta-label">Method</div><div class="meta-value">${m.method}</div></div>
      </div>
      <div class="content">
        <div class="card" style="align-self:start">
          <div class="card-header">
            <span class="card-header-title">Ingredients</span>
            <div class="card-header-accent"></div>
          </div>
          <div class="ingredients-list">${ings}</div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-header-title">Method</span>
            <div class="card-header-accent"></div>
          </div>
          <div class="steps-list">${steps}</div>
        </div>
        <div class="tip-card">
          <div class="tip-icon">💡</div>
          <div>
            <div class="tip-label">Chef's Tip</div>
            <div class="tip-text">${m.tip}</div>
          </div>
        </div>
        <div class="prep-card">
          <div class="prep-toggle" onclick="togglePrep(this)">
            <div class="prep-toggle-left">
              <span class="prep-tag">Prep Ahead</span>
              <span class="prep-title">What to prep ahead for this meal</span>
            </div>
            <svg class="prep-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="prep-body">${prepItems}</div>
        </div>
      </div>
    `;
    main.appendChild(panel);
  });
}

function activateTab(index) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === index));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function togglePrep(toggle) {
  const body = toggle.nextElementSibling;
  const chevron = toggle.querySelector('.prep-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

buildTabs();
buildPanels();
</script>
