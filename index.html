<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steve's Kitchen — Week of 13 May</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --page-bg: #F7F6F3;
    --card-bg: #FFFFFF;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: #EBEBEB;
    --accent: #111111;
    --transition: 0.22s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--page-bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 56px;
  }
  .site-logo {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }
  .site-logo span { color: var(--text-muted); font-weight: 400; }
  .site-meta { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .tab-bar {
    position: sticky; top: 56px; z-index: 99;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto;
    scrollbar-width: none; -ms-overflow-style: none;
    padding: 0 20px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 20px 10px;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: border-color var(--transition), color var(--transition);
    user-select: none;
  }
  .tab:hover .tab-day { color: var(--text-primary); }
  .tab-day {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    color: var(--text-muted);
    text-transform: uppercase;
    transition: color var(--transition);
    margin-bottom: 2px;
  }
  .tab-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    transition: color var(--transition);
    max-width: 130px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .tab.active .tab-day { color: var(--tab-accent, #111); }
  .tab.active .tab-name { color: var(--tab-accent, #111); font-weight: 600; }
  .tab.active { border-bottom-color: var(--tab-accent, #111); }

  .panel { display: none; }
  .panel.active { display: block; }

  .hero {
    width: 100%; height: 280px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: var(--hero-gradient);
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
  }
  .hero-emoji {
    position: absolute; right: 48px; top: 50%;
    transform: translateY(-50%);
    font-size: 120px; opacity: 0.12;
    filter: grayscale(0.2);
    pointer-events: none;
    user-select: none;
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 0 36px 28px;
  }
  .cuisine-pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);
    margin-bottom: 10px;
  }
  .hero-title {
    font-size: 32px; font-weight: 800; line-height: 1.15;
    color: #fff; letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .hero-subtitle {
    font-size: 14px; color: rgba(255,255,255,0.75);
    font-style: italic; font-weight: 400;
  }

  .meta-strip {
    background: #fff;
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .meta-strip::-webkit-scrollbar { display: none; }
  .meta-item {
    flex: 1; min-width: 100px;
    display: flex; flex-direction: column; align-items: center;
    padding: 14px 16px;
    border-right: 1px solid var(--border);
  }
  .meta-item:last-child { border-right: none; }
  .meta-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 3px;
  }
  .meta-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }

  .content {
    max-width: 1100px; margin: 0 auto;
    padding: 32px 24px 60px;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
  }
  @media (max-width: 780px) {
    .content { grid-template-columns: 1fr; padding: 20px 16px 48px; gap: 16px; }
    .hero { height: 220px; }
    .hero-title { font-size: 24px; }
    .hero-emoji { font-size: 80px; right: 20px; }
    .hero-content { padding: 0 20px 20px; }
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
  }
  .card-header-accent {
    width: 20px; height: 3px; border-radius: 2px;
    background: var(--meal-accent);
    margin-left: auto;
  }

  .ingredients-list { padding: 8px 0; }
  .ingredient-row {
    display: flex; align-items: baseline;
    padding: 8px 20px;
    gap: 12px;
    border-bottom: 1px solid #F4F4F4;
    transition: background var(--transition);
  }
  .ingredient-row:last-child { border-bottom: none; }
  .ingredient-row:hover { background: #FAFAFA; }
  .ing-qty {
    font-size: 12px; font-weight: 700;
    color: var(--text-primary);
    min-width: 62px; flex-shrink: 0;
  }
  .ing-name { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

  .steps-list { padding: 4px 0; }
  .step {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 0 14px;
    padding: 14px 20px;
    border-bottom: 1px solid #F4F4F4;
  }
  .step:last-child { border-bottom: none; }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--meal-accent);
    color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .step-body {}
  .step-head-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 5px; flex-wrap: wrap;
  }
  .step-heading { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .time-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    background: var(--meal-accent-light);
    color: var(--meal-accent);
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .step-text {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65;
  }

  .tip-card {
    grid-column: 1 / -1;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--meal-accent);
    padding: 16px 20px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .tip-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: var(--meal-accent); margin-bottom: 3px; }
  .tip-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .prep-card {
    grid-column: 1 / -1;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .prep-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition);
  }
  .prep-toggle.open { border-bottom-color: var(--border); }
  .prep-toggle-left { display: flex; align-items: center; gap: 10px; }
  .prep-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    background: #F0F0F0; color: var(--text-muted);
    padding: 3px 8px; border-radius: 6px;
    text-transform: uppercase;
  }
  .prep-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .prep-chevron {
    width: 20px; height: 20px; color: var(--text-muted);
    transition: transform var(--transition);
    flex-shrink: 0;
  }
  .prep-chevron.open { transform: rotate(180deg); }
  .prep-body { display: none; padding: 16px 20px; }
  .prep-body.open { display: block; }
  .prep-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 7px 0;
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.55;
    border-bottom: 1px solid #F4F4F4;
  }
  .prep-item:last-child { border-bottom: none; }
  .prep-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--meal-accent); flex-shrink: 0; margin-top: 7px;
  }

  .site-footer {
    text-align: center; padding: 24px;
    font-size: 12px; color: var(--text-muted);
    border-top: 1px solid var(--border);
    background: #fff;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel.active { animation: fadeIn 0.2s ease forwards; }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">Steve's Kitchen <span>/ Meal Plan</span></div>
  <div class="site-meta">Week of 13 May 2026</div>
</header>

<nav class="tab-bar" id="tabBar"></nav>
<main id="mainContent"></main>

<footer class="site-footer">
  Virtual Steve Chef &nbsp;·&nbsp; All recipes serve 2–3
</footer>

<script>
const MEALS = [
  {
    day: 'Wednesday', shortDay: 'WED', date: '13 May',
    name: 'Spiced Lamb Kofta',
    subtitle: 'with Flatbreads & Harissa Yogurt',
    cuisine: 'Middle Eastern', serves: '2–3', time: '25 min', method: 'Pan',
    emoji: '🫓',
    gradient: 'linear-gradient(135deg, #0a0400 0%, #4A1800 45%, #8C3A18 100%)',
    accent: '#A04020',
    accentLight: '#FCF0EB',
    ingredients: [
      ['500g','Lamb mince'],
      ['1.5 tsp','Cumin, ground'],
      ['1 tsp','Coriander, ground'],
      ['½ tsp','Cinnamon, ground'],
      ['½ tsp','Chilli powder'],
      ['1 tbsp','Ginger paste'],
      ['1 tsp','Sea salt'],
      ['1 tbsp','Olive oil'],
      ['2–3','Flatbreads'],
      ['150g','Greek yogurt'],
      ['2 tbsp','Harissa paste'],
      ['1','Lemon, halved'],
      ['to serve','Fresh coriander'],
    ],
    steps: [
      ['5 min','Mix the kofta','Combine 500g lamb mince with cumin, coriander, cinnamon, chilli powder, ginger paste and 1 tsp salt in a bowl. Mix with your hands — just enough to combine. Don\'t overwork it. Form into 8–10 oval sausage shapes, about 8cm long. Press them firm so they hold their shape.'],
      ['1 min','Make the harissa yogurt','Mix 150g Greek yogurt with 2 tbsp harissa paste and a good squeeze of lemon. Taste — it should be creamy with a hit of heat. Add more harissa if you want it spicier. Set aside.'],
      ['12 min','Cook the kofta','Heat HexClad pan on medium-high (7/10). Add 1 tbsp olive oil. Lay kofta in — don\'t crowd them. Cook undisturbed 3–4 min until a deep brown crust forms underneath, then turn. Cook 3 min more. Turn once more for even colour all round — total about 10–12 min. They should be firm and dark on all sides, cooked through with no pink.'],
      ['2 min','Warm the flatbreads','30 seconds each side in a dry pan over medium heat, or 20 sec in the microwave wrapped in a damp paper towel. Slightly charred edges are good.'],
      ['1 min','Serve','Spread harissa yogurt on the flatbreads. Lay 3–4 kofta on each. Squeeze more lemon over. Scatter fresh coriander.'],
    ],
    tip: 'Don\'t overwork the mince when mixing — just combine. Over-mixing melts the fat and makes the kofta dense and tough. Work quickly and with cool hands.',
    sundayPrep: [
      'Mix and shape the kofta ahead — store covered in the fridge for up to 24 hrs. Fresher flavour if you season the mix and shape it just before cooking.',
      'Make the harissa yogurt in advance and refrigerate.',
    ],
  },
  {
    day: 'Thursday', shortDay: 'THU', date: '14 May',
    name: 'Beef Keema',
    subtitle: 'with Red Lentil Dahl & Basmati Rice',
    cuisine: 'Indian', serves: '2–3 + lunch', time: '30 min', method: 'Pan',
    emoji: '🍛',
    gradient: 'linear-gradient(135deg, #060200 0%, #3C1000 45%, #7A2E08 100%)',
    accent: '#903A10',
    accentLight: '#FBF0EA',
    ingredients: [
      ['400g','Beef mince'],
      ['100g','Red lentils (dried), rinsed'],
      ['200g','Basmati rice'],
      ['1 large','Onion, finely diced'],
      ['3 cloves','Garlic, minced'],
      ['1 tbsp','Ginger paste'],
      ['2 tsp','Cumin, ground'],
      ['2 tsp','Coriander, ground'],
      ['1 tsp','Turmeric'],
      ['1 tsp','Garam masala'],
      ['1 tsp','Chilli powder'],
      ['1 tin','Chopped tomatoes (400g)'],
      ['1 tbsp','Tomato purée'],
      ['1 tbsp','Vegetable oil'],
      ['300ml','Water (for lentils)'],
      ['to taste','Salt'],
      ['to serve','Fresh coriander & lemon'],
    ],
    steps: [
      ['15 min','Start rice and lentils together','Rinse 200g basmati and start in the rice cooker. In a separate small saucepan, add rinsed 100g red lentils, 300ml water and ¼ tsp turmeric. Bring to a boil, then simmer gently 15 min, stirring occasionally, until lentils are completely soft and collapsing. Add a splash more water if they get too thick. Season with salt at the end.'],
      ['6 min','Brown the mince — properly','Heat HexClad pan on high. Add 1 tbsp vegetable oil. Add beef mince, press it flat. Leave undisturbed 2–3 min to build a deep brown crust. Then break up with a spoon and continue cooking until all the pink is gone. Season well with salt and pepper. A proper sear here is the difference between a flat mince dish and a flavourful one.'],
      ['5 min','Soften the onion','Push mince to one side. Lower heat to medium. Add diced onion to the cleared half of the pan. Cook 4–5 min, stirring, until soft and translucent. Then mix together with the mince.'],
      ['90 sec','Add garlic, ginger, spices','Add 3 cloves minced garlic, 1 tbsp ginger paste, 2 tsp cumin, 2 tsp coriander, remaining ¾ tsp turmeric, 1 tsp chilli powder and 1 tbsp tomato purée. Stir everything together on medium-high for 90 sec. The spices bloom, the purée caramelises slightly, and the raw edge cooks out.'],
      ['10 min','Simmer the sauce','Pour in 1 tin chopped tomatoes. Stir well, scraping up any fond. Bring to a simmer and cook uncovered 8–10 min until thickened and reduced. Stir in 1 tsp garam masala. Taste: adjust salt and chilli.'],
      ['2 min','Combine and finish','Stir the cooked lentils through the keema — they\'ll thicken everything further and add body. If it\'s very thick, loosen with a splash of water. Squeeze lemon over, scatter coriander. Serve over rice.'],
    ],
    tip: 'This is one of the best batch-cook meals in the plan — it actively improves overnight as the spices deepen. Make the full amount even if it\'s just the two of you. Reheat Thursday\'s leftovers with a splash of water for Friday lunch.',
    sundayPrep: [
      'Dice onion and mince garlic in advance — store covered.',
      'Rinse and soak lentils for 10 min before cooking to speed up the simmer.',
    ],
  },
  {
    day: 'Friday', shortDay: 'FRI', date: '15 May',
    name: 'Pan-seared Lamb Chops',
    subtitle: 'with Beef Stock Jus & Air Fryer Chips',
    cuisine: 'French / Western', serves: '2–3', time: '30 min', method: 'Pan + Air fryer',
    emoji: '🥩',
    gradient: 'linear-gradient(135deg, #05000a 0%, #2A0A30 45%, #5A1850 100%)',
    accent: '#6E2260',
    accentLight: '#F8EEF6',
    ingredients: [
      ['4','Lamb loin chops or cutlets'],
      ['1 carton','Beef stock (500ml)'],
      ['2 tbsp','Red wine vinegar'],
      ['1 tsp','Thyme, dried'],
      ['1 tsp','Black pepper, ground'],
      ['1 tbsp','Olive oil'],
      ['600g','Potatoes, cut into thick chips'],
      ['1 tbsp','Vegetable oil (for chips)'],
      ['to taste','Sea salt'],
    ],
    steps: [
      ['28 min','Start the chips first','Cut 600g potatoes into thick chips (roughly 1.5cm thick, skin on). Toss with 1 tbsp vegetable oil and a generous pinch of sea salt. Preheat Ninja to 200°C for 3 min. Cook 25–28 min, shaking the basket at the halfway point. They should be deep golden and crispy on the outside, fluffy inside. Add 3–5 min if needed.'],
      ['5 min','Season the chops','Pat lamb chops dry with kitchen paper — moisture = no crust. Season both sides liberally with sea salt, black pepper and dried thyme. Press the seasoning firmly into the meat. Leave to sit at room temperature for at least 10 min while the chips cook.'],
      ['6 min','Sear the chops','When chips have 10 min left, heat HexClad pan on high until it\'s properly smoking. Add 1 tbsp olive oil. Lay chops away from you. Leave completely undisturbed for 2–3 min — you need to let the crust form and release naturally. Flip. Another 2–3 min. For cutlets: 2 min per side. For thicker loin chops: 3 min per side. The goal is deep mahogany brown, not grey.'],
      ['6 min','Rest the chops + build the jus','Remove chops to a warm plate. Don\'t wash the pan. Turn to medium heat. Add 2 tbsp red wine vinegar — it will sizzle and spit hard, lifting all the dark fond immediately. Stir and scrape for 30 sec. Pour in 500ml beef stock. Bring to a boil then reduce heat. Simmer 5–6 min until reduced by roughly half and the jus coats the back of a spoon. Add ½ tsp thyme. Taste: it should be rich, savoury and slightly sharp. Adjust salt.'],
      ['1 min','Plate','Chips first, chops on top or alongside, jus poured over everything. Serve immediately.'],
    ],
    tip: 'The fond — the dark brown stuck bits in the pan after the chops — is pure concentrated flavour. The red wine vinegar lifts it instantly. Don\'t be alarmed by the sizzle and steam. Add the stock straight after, before it burns.',
    sundayPrep: [
      'Cut chips and store in cold water in the fridge — drain and pat dry before cooking.',
      'Season chops with salt and pepper up to a day ahead for deeper flavour.',
    ],
  },
  {
    day: 'Saturday', shortDay: 'SAT', date: '16 May',
    name: 'Chicken Shawarma Thighs',
    subtitle: 'with Spiced Chickpeas & Garlic Yogurt',
    cuisine: 'Middle Eastern', serves: '2–3', time: '40 min', method: 'Air fryer + Pan',
    emoji: '🍗',
    gradient: 'linear-gradient(135deg, #080400 0%, #3E1C00 45%, #7C3A08 100%)',
    accent: '#9E4A10',
    accentLight: '#FBF2EA',
    ingredients: [
      ['4–6','Chicken thighs, boneless & skinless'],
      ['1.5 tsp','Cumin, ground'],
      ['1.5 tsp','Coriander, ground'],
      ['1 tsp','Turmeric'],
      ['½ tsp','Cinnamon, ground'],
      ['1 tsp','Smoked paprika'],
      ['½ tsp','Chilli powder'],
      ['2 tbsp','Preserved lemon paste'],
      ['2 tbsp','Olive oil'],
      ['1','Lemon, juiced'],
      ['2 tins','Chickpeas (400g each), drained'],
      ['1 tbsp','Harissa paste'],
      ['1 tbsp','Olive oil (for chickpeas)'],
      ['150g','Greek yogurt'],
      ['2 cloves','Garlic, minced'],
      ['to taste','Salt'],
    ],
    steps: [
      ['20+ min','Marinate the chicken — do this first','Mix together: cumin, coriander, turmeric, cinnamon, smoked paprika, chilli powder, preserved lemon paste, 2 tbsp olive oil and the juice of 1 lemon into a paste. Coat the thighs thoroughly all over. Marinate at least 20 min — longer is better. If you\'re planning ahead, do this in the morning.'],
      ['18 min','Air fry the chicken','Preheat Ninja to 190°C. Place thighs in a single layer. Cook 15–18 min, flipping halfway. Boneless skinless thighs cook fast — check at 15 min. They\'re done when deep golden and the thickest part shows no pink when pressed or cut. Don\'t overcook: without skin or bone they dry out quickly past the 18 min mark.'],
      ['5 min','Spiced chickpeas','While the chicken is in its final stretch: heat 1 tbsp olive oil in HexClad pan on medium-high. Add both tins of drained chickpeas. Add 1 tbsp harissa paste, pinch each of cumin and salt. Toss 4–5 min until chickpeas are hot and some have crisped at the edges. Squeeze half a lemon over at the end.'],
      ['1 min','Make garlic yogurt','Mix 150g Greek yogurt with 2 cloves minced garlic, a pinch of salt and a squeeze of lemon. Stir and taste — it should be cooling and garlicky. Let it sit for 5 min for the garlic to mellow slightly.'],
      ['1 min','Plate','Spoon chickpeas onto plates. Place chicken thighs on top. Spoon garlic yogurt alongside or over. Serve with flatbreads if you have them, or as is.'],
    ],
    tip: 'Preserved lemon paste is the flavour backbone of this marinade — it does a different job to fresh lemon. Don\'t swap it out. Boneless thighs cook faster than bone-in so keep an eye from 15 min — they\'re done the moment the marinade has caught colour and the meat feels firm with no give.',
    sundayPrep: [
      'Marinate the chicken in the morning for maximum flavour — cover and refrigerate, then go straight to the air fryer at dinner time.',
      'Make the garlic yogurt ahead and refrigerate — the garlic mellows nicely over a few hours.',
    ],
  },
  {
    day: 'Sunday', shortDay: 'SUN', date: '17 May',
    name: 'Turkey Pad Kra Pao',
    subtitle: 'Thai Basil Stir-fry with Basmati Rice & Fried Egg — Oli\'s to run',
    cuisine: 'Thai', serves: '2–3', time: '25 min', method: 'Wok',
    emoji: '🌿',
    gradient: 'linear-gradient(135deg, #010a03 0%, #093018 45%, #126030 100%)',
    accent: '#187040',
    accentLight: '#EBF7F1',
    ingredients: [
      ['500g','Turkey mince'],
      ['2 tbsp','Vegetable oil'],
      ['4 cloves','Garlic, minced'],
      ['2','Fresh red chillies, roughly chopped (or 1 tsp chilli flakes)'],
      ['2 tbsp','Light soy sauce'],
      ['1 tbsp','Dark soy sauce'],
      ['1 tbsp','Fish sauce'],
      ['2 tsp','Sugar (golden granulated)'],
      ['Large handful','Thai basil leaves — essential, see tip'],
      ['4','Spring onions, sliced'],
      ['2–3','Eggs (one per person, fried on top)'],
      ['200g','Basmati rice'],
      ['extra','Vegetable oil for frying eggs'],
    ],
    steps: [
      ['15 min','Start rice','Rinse 200g basmati and start in the rice cooker before anything else.'],
      ['2 min','Get the wok ripping hot','Put HexClad wok on the highest gas flame. Leave it for 2 full minutes until it\'s properly smoking. This isn\'t optional — Pad Kra Pao needs serious heat to work. A medium-heat wok gives you steamed grey mince, not a proper stir-fry.'],
      ['1 min','Garlic and chilli in','Add 2 tbsp vegetable oil to the hot wok. Immediately add minced garlic and chopped chilli. Stir constantly for 30–40 sec until fragrant. Don\'t let the garlic burn — it goes from raw to golden to bitter very fast at this heat.'],
      ['4 min','Add turkey, get colour first','Add 500g turkey mince. Spread it out across the wok and leave it for 60–90 sec — let it sear without moving it. You want some browning, not steaming. Then break it up with a spatula and toss. Continue cooking, tossing regularly, until all the pink is gone — about 3–4 min total.'],
      ['2 min','Season and glaze','Add 2 tbsp light soy, 1 tbsp dark soy, 1 tbsp fish sauce and 2 tsp sugar. Toss everything together on high heat for 60–90 sec. The sauce should coat the mince and start to caramelise slightly. Taste: if it\'s flat, add a tiny bit more fish sauce. If too salty, a touch more sugar.'],
      ['30 sec','Basil off the heat','Take the wok off the gas. Immediately throw in the Thai basil leaves. Toss once — they\'ll wilt almost instantly from the residual heat. The aroma will fill the kitchen. This is the moment the dish becomes Pad Kra Pao.'],
      ['3 min','Fry the eggs','In a small pan, heat a generous splash of oil on medium-high. Crack eggs in and fry until the whites are fully set but the yolk is still runny — sunny-side up. The edges should be slightly crispy.'],
      ['1 min','Serve','Rice in the bowls, mince on top, fried egg over everything. Sliced spring onions scattered over.'],
    ],
    tip: 'Thai basil is the dish. Regular Italian basil won\'t give you the same anise-y, peppery hit — it\'s worth sourcing (Waitrose, Asian supermarkets, or a large Tesco Extra usually stock it). If you genuinely can\'t find it, use regular basil plus an extra splash of fish sauce, but it\'s a different dish.',
    sundayPrep: [
      'Mince garlic and chop chillies in advance.',
      'Slice spring onions ahead.',
      'For Oli: measure out the soy sauces, fish sauce and sugar into a small bowl before cooking — it all needs to go in fast once the mince is done.',
    ],
  },
];

// ── RENDER ──────────────────────────────────────────────────────────────────

function buildTabs() {
  const bar = document.getElementById('tabBar');
  MEALS.forEach((m, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.style.setProperty('--tab-accent', m.accent);
    tab.dataset.index = i;
    tab.innerHTML = `<div class="tab-day">${m.shortDay}</div><div class="tab-name">${m.name.split(' ').slice(0,3).join(' ')}</div>`;
    tab.addEventListener('click', () => activateTab(i));
    bar.appendChild(tab);
  });
}

function buildPanels() {
  const main = document.getElementById('mainContent');
  MEALS.forEach((m, i) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.dataset.index = i;
    panel.style.setProperty('--meal-accent', m.accent);
    panel.style.setProperty('--meal-accent-light', m.accentLight);

    const ings = m.ingredients.map(([qty, name]) =>
      `<div class="ingredient-row"><span class="ing-qty">${qty}</span><span class="ing-name">${name}</span></div>`
    ).join('');

    const steps = m.steps.map(([time, head, body], idx) =>
      `<div class="step">
        <div class="step-num">${idx + 1}</div>
        <div class="step-body">
          <div class="step-head-row">
            <span class="step-heading">${head}</span>
            <span class="time-badge">${time}</span>
          </div>
          <p class="step-text">${body}</p>
        </div>
      </div>`
    ).join('');

    const prepItems = m.sundayPrep.map(p =>
      `<div class="prep-item"><div class="prep-dot"></div><div>${p}</div></div>`
    ).join('');

    panel.innerHTML = `
      <div class="hero" style="--hero-gradient: ${m.gradient}">
        <div class="hero-bg"></div>
        <div class="hero-emoji">${m.emoji}</div>
        <div class="hero-content">
          <div class="cuisine-pill">${m.cuisine}</div>
          <div class="hero-title">${m.name}</div>
          <div class="hero-subtitle">${m.subtitle}</div>
        </div>
      </div>
      <div class="meta-strip">
        <div class="meta-item"><div class="meta-label">Day</div><div class="meta-value">${m.day} · ${m.date}</div></div>
        <div class="meta-item"><div class="meta-label">Serves</div><div class="meta-value">${m.serves}</div></div>
        <div class="meta-item"><div class="meta-label">Active time</div><div class="meta-value">${m.time}</div></div>
        <div class="meta-item"><div class="meta-label">Method</div><div class="meta-value">${m.method}</div></div>
      </div>
      <div class="content">
        <div class="card" style="align-self:start">
          <div class="card-header">
            <span class="card-header-title">Ingredients</span>
            <div class="card-header-accent"></div>
          </div>
          <div class="ingredients-list">${ings}</div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-header-title">Method</span>
            <div class="card-header-accent"></div>
          </div>
          <div class="steps-list">${steps}</div>
        </div>
        <div class="tip-card">
          <div class="tip-icon">💡</div>
          <div>
            <div class="tip-label">Chef's Tip</div>
            <div class="tip-text">${m.tip}</div>
          </div>
        </div>
        <div class="prep-card">
          <div class="prep-toggle" onclick="togglePrep(this)">
            <div class="prep-toggle-left">
              <span class="prep-tag">Prep Ahead</span>
              <span class="prep-title">What to prep ahead for this meal</span>
            </div>
            <svg class="prep-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="prep-body">${prepItems}</div>
        </div>
      </div>
    `;
    main.appendChild(panel);
  });
}

function activateTab(index) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === index));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function togglePrep(toggle) {
  const body = toggle.nextElementSibling;
  const chevron = toggle.querySelector('.prep-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

buildTabs();
buildPanels();
</script>
</body>
</html>
